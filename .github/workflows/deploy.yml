# Deployment workflow for Hostinger
name: Deploy React App to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: # Enable manually triggering the workflow from the GitHub Actions tab

jobs:
  build-and-deploy:
    name: Build & Upload via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Copy .htaccess to dist
        run: cp .htaccess dist/ || true

      - name: Sync Files to Hostinger FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          server-dir: ./public_html/
          # Fix for 'Timeout (control socket)' / Hostinger FTP handshake issue:
          # Using plain FTP bypassing TLS handshake. (Set to 'ftps' with 'security: loose' if secure is required)
          protocol: ftp
          port: 21
