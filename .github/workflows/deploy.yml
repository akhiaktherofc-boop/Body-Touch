# Deployment workflow for Hostinger
name: Build Verification

on:
  push:
    branches:
      - main
  workflow_dispatch: # Enable manually triggering the workflow from the GitHub Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-verify:
    name: Build & Verify Project
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Copy .htaccess to dist
        run: cp .htaccess dist/ || true


