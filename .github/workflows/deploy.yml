# Deployment workflow for Hostinger
name: Deploy React App to Hostinger via FTP

on:
  push:
    branches:
      - main
  workflow_dispatch: # Enable manually triggering the workflow from the GitHub Actions tab

jobs:
  build-and-deploy:
    name: Build & Upload via FTP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Copy .htaccess to dist
        run: cp .htaccess dist/ || true

      - name: Sanitize FTP Credentials
        id: prep
        uses: actions/github-script@v7
        with:
          script: |
            let server = process.env.FTP_SERVER || '';
            let username = process.env.FTP_USERNAME || '';
            let password = process.env.FTP_PASSWORD || '';
            
            console.log(`Raw server input length: ${server.length}`);
            console.log(`Raw username input length: ${username.length}`);
            
            // Validate presence of required secrets
            if (!server || !username || !password) {
              core.setFailed(`
            ❌ Error: Missing essential FTP Secrets!
            Make sure you have added all three Secrets in your GitHub repository:
            - FTP_SERVER (Current Status: ${server ? '✅ Set' : '❌ MISSING'})
            - FTP_USERNAME (Current Status: ${username ? '✅ Set' : '❌ MISSING'})
            - FTP_PASSWORD (Current Status: ${password ? '✅ Set' : '❌ MISSING'})
            
            How to configure Secrets in GitHub:
            1. Go to your GitHub repository -> Settings -> Secrets and variables -> Actions
            2. Click "New repository secret"
            3. Name them exactly as above (case-sensitive) and paste your Hostinger FTP credentials.
              `);
              return;
            }
            
            // Clean server address:
            // 1. Trim leading and trailing spaces
            server = server.trim();
            // 2. Remove protocol prefix (e.g. ftp://, ftps://, sftp://, http://, https://)
            server = server.replace(/^(ftp|ftps|sftp|http|https):\/\//i, '');
            // 3. Remove any trailing path/directory components (split by '/')
            server = server.split('/')[0];
            // 4. Remove any trailing port number components (split by ':')
            server = server.split(':')[0];
            
            username = username.trim();
            password = password.trim();
            
            console.log(`Sanitized server address: ${server || '(empty)'}`);
            console.log(`Sanitized username length: ${username.length}`);
            
            core.setOutput('server', server);
            core.setOutput('username', username);
            core.setOutput('password', password);
        env:
          FTP_SERVER: ${{ secrets.FTP_SERVER }}
          FTP_USERNAME: ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}

      - name: Install LFTP
        run: |
          sudo apt-get update
          sudo apt-get install -y lftp

      - name: Sync Files to Hostinger FTP (Robust Mode)
        run: |
          lftp -c "
          set ftp:ssl-allow yes;
          set ftp:ssl-force yes;
          set ssl:verify-certificate no;
          set ftp:passive-mode true;
          set net:timeout 20;
          set net:max-retries 4;
          set net:reconnect-interval-multiplier 2;
          set net:reconnect-interval-base 5;
          open -u '${{ steps.prep.outputs.username }}','${{ steps.prep.outputs.password }}' '${{ steps.prep.outputs.server }}';
          lcd ./dist;
          mirror -R --delete --verbose=3 . ./public_html;
          quit;
          "
