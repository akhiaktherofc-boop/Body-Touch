# Deployment workflow for Hostinger
name: Build and Deploy to Hostinger

on:
  push:
    branches:
      - main
  workflow_dispatch: # Enable manually triggering the workflow from the GitHub Actions tab

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install --legacy-peer-deps

      - name: Build Project
        run: npm run build

      - name: Copy .htaccess to dist
        run: cp .htaccess dist/ || true

      - name: 📂 Sync files to Hostinger via FTP
        # Only run deployment if FTP secrets are configured in GitHub Settings -> Secrets
        if: ${{ secrets.FTP_SERVER != '' && secrets.FTP_USERNAME != '' }}
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist/
          # Change this to your target directory on Hostinger (e.g. /public_html/ or /)
          server-dir: /public_html/
          state-name: .ftp-deploy-sync-state.json



